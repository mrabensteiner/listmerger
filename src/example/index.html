<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="listmerger.css">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icons/merge.svg" sizes="any" type="image/svg+xml">
<title>ListMerger Demo - Extended Example</title>
</head>

<body>
<div id="page">
  <h1>ListMerger Demo - Extended Example</h1>
  <p><a href="simple.html">Simple Example</a></p>

  <div>
    <button id="undo" disabled>Undo</button>
    <button id="redo" disabled>Redo</button>
    <button class="open" id="open">Open JSON</button>
    <button class="save" id="save-json">Save to JSON</button>
    <button class="save" id="save-console">Save to Console</button>
  </div>

  <div class="container" id="listmerger">
    
    <div class="mergelist-container">
      <p>Merged List <span class="indicator">0</span></p>
      <div class="list" data-role="list" id="mergelist"></div>
    </div>
    <div class="tab-container">
      <select id="detailsselector"></select>
      <div class="tabbar"></div>
    </div>
  </div>
</div>

<script type="module" src="./lib/listmerger.js"></script>
<script type="module" src="./main.js"></script>
</body>
</html>
